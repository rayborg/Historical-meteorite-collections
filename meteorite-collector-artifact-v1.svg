  <title id="title">Historical meteorite fragment on an archival specimen label</title>
  <desc id="desc">A restrained, low-contrast header artifact showing an irregular dark meteorite fragment resting over a worn cream catalog label, with hand-drawn inventory lines and small brass pin and seal details on a transparent background.</desc>
  <metadata>Produced by Raymond Borges Hink</metadata>
