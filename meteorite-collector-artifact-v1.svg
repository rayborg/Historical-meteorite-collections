      <stop offset="0.52" stop-color="#cfc09f" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#b9aa8d" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.12" y1="0.08" x2="0.9" y2="0.92">
