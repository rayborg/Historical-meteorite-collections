      <stop offset="0.46" stop-color="#48453f" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#2f302e" stop-opacity="0.94"/>
    </linearGradient>
    <radialGradient id="brass" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#d1b26d" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#a58243" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#6f5730" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
